name: Update Homebrew Tap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Stable release tag to publish to the tap (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  update-homebrew-tap:
    runs-on: macos-26
    steps:
      - name: Resolve release tag
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag $TAG is not a stable vX.Y.Z release, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Error: release $TAG not found"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download DMGs from release
        if: ${{ steps.resolve.outputs.skip != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.resolve.outputs.tag }}
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          mkdir -p artifacts
          for ARCH in arm64 x86_64; do
            gh release download "$TAG" \
              --repo "${{ github.repository }}" \
              --pattern "Muxy-${VERSION}-${ARCH}.dmg" \
              --dir "artifacts"
          done

      - name: Compute SHA256 checksums
        if: ${{ steps.resolve.outputs.skip != 'true' }}
        id: sha256
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          ARM64_SHA=$(shasum -a 256 "artifacts/Muxy-${VERSION}-arm64.dmg" | awk '{print $1}')
          X86_64_SHA=$(shasum -a 256 "artifacts/Muxy-${VERSION}-x86_64.dmg" | awk '{print $1}')
          echo "arm64=$ARM64_SHA" >> "$GITHUB_OUTPUT"
          echo "x86_64=$X86_64_SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap
        if: ${{ steps.resolve.outputs.skip != 'true' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.resolve.outputs.version }}
          SHA256_ARM64: ${{ steps.sha256.outputs.arm64 }}
          SHA256_X86_64: ${{ steps.sha256.outputs.x86_64 }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/muxy-app/homebrew-tap.git tap
          mkdir -p tap/Casks
          cat > tap/Casks/muxy.rb <<EOF
          cask "muxy" do
            version "${VERSION}"

            on_arm do
              sha256 "${SHA256_ARM64}"
              url "https://github.com/muxy-app/muxy/releases/download/v#{version}/Muxy-#{version}-arm64.dmg"
            end

            on_intel do
              sha256 "${SHA256_X86_64}"
              url "https://github.com/muxy-app/muxy/releases/download/v#{version}/Muxy-#{version}-x86_64.dmg"
            end

            name "Muxy"
            desc "Terminal multiplexer for macOS"
            homepage "https://github.com/muxy-app/muxy"

            livecheck do
              url :url
              strategy :github_latest
            end

            app "Muxy.app"

            zap trash: [
              "~/Library/Application Support/Muxy",
              "~/Library/Preferences/app.muxy.Muxy.plist",
              "~/Library/Saved Application State/app.muxy.Muxy.savedState",
            ]
          end
          EOF
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/muxy.rb
          if git diff --cached --quiet; then
            echo "Tap already at v${VERSION}, nothing to commit"
            exit 0
          fi
          git commit -m "Update Muxy to v${VERSION}"
          git push
